<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>Créer un compte</h1>
        <div id="error-msg" class="error hidden"></div>
        <div id="success-msg" class="success hidden"></div>
        <form id="register-form">
            <div class="field">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" required placeholder="Prenom Nom">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" required placeholder="votre@email.com">
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary">S'inscrire</button>
        </form>
        <p class="auth-link">Déjà un compte ? <a href="index.html">Se connecter</a></p>
    </div>
    <script src="auth.js"></script>
</body>
</html>
